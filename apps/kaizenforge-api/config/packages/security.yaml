security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Contexts\Auth\Infrastructure\Persistence\Doctrine\Entity\DoctrineUser: 'auto'

    providers:
        kf_users:
            entity:
                class: App\Contexts\Auth\Infrastructure\Persistence\Doctrine\Entity\DoctrineUser
                property: id

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        login:
            pattern: ^/api/v1/auth/login$
            stateless: true
            security: false

        api:
            pattern: ^/api
            stateless: true
            provider: kf_users
            user_checker: App\Contexts\Auth\Infrastructure\Security\ActiveUserChecker
            entry_point: App\Shared\Infrastructure\Security\ApiAuthenticationEntryPoint
            access_denied_handler: App\Shared\Infrastructure\Security\ApiAccessDeniedHandler
            access_token:
                token_handler: App\Contexts\Auth\Infrastructure\Security\AccessTokenHandler
                failure_handler: App\Shared\Infrastructure\Security\ApiAuthenticationFailureHandler

        main:
            lazy: true

    access_control:
        - { path: ^/api/health$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/auth/login$, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
