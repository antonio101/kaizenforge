services:
  mariadb:
    image: mariadb:10.11
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-app}
      MARIADB_USER: ${DB_USERNAME:-app}
      MARIADB_PASSWORD: ${DB_PASSWORD:-app}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "${DB_PORT:-13306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  php:
    build:
      context: ./apps/kaizenforge-api
    volumes:
      - ./apps/kaizenforge-api:/var/www/html
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx-dev:
    image: nginx:1.27-alpine
    profiles: ["dev"]
    ports:
      - "${APP_PORT:-18000}:80"
    volumes:
      - ./apps/kaizenforge-api:/var/www/html:ro
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  frontend-dev:
    build:
      context: ./apps/kaizenforge-web
      target: dev
    profiles: ["dev"]
    ports:
      - "${FRONTEND_DEV_PORT:-15173}:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./apps/kaizenforge-web:/app
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

  queue:
    profiles: ["workers"]
    build:
      context: ./apps/kaizenforge-api
    volumes:
      - ./apps/kaizenforge-api:/var/www/html
    depends_on:
      - php
    command: ["sh", "-lc", "php bin/console messenger:consume async -vv --time-limit=3600 --memory-limit=256M --no-interaction"]

  scheduler:
    profiles: ["workers"]
    build:
      context: ./apps/kaizenforge-api
    volumes:
      - ./apps/kaizenforge-api:/var/www/html
    depends_on:
      - php
    command: ["sh", "-lc", "while true; do php bin/console app:schedule:run --no-interaction || true; sleep 60; done"]

  frontend-build:
    profiles: ["prod"]
    build:
      context: ./apps/kaizenforge-web
      target: export
    volumes:
      - frontend_dist:/out
    command: ["sh", "-lc", "rm -rf /out/* && cp -r /dist/. /out/"]

  nginx-prod:
    image: nginx:1.27-alpine
    profiles: ["prod"]
    ports:
      - "${PROD_WEB_PORT:-18080}:80"
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
      - ./apps/kaizenforge-api:/var/www/html:ro
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - frontend-build

volumes:
  mariadb_data:
  redis_data:
  node_modules_cache:
  frontend_dist: